<!DOCTYPE html>
<html>
<head>
	<title>Contact US</title>
	<style>
		#map{
			height: 500px;
			width: 100%;

		}
	</style>
</head>
<body>
	<div id="map">
		
	</div>

	<script>
		function initmap(){
			var location = {lat: 19.1501338, lng: 77.31409};
			var map = new google.maps.Map(document.getElementById("map"),{
				zoom: 16,
				center: location 
			});
			new google.maps.Marker({
				position: location,
				map: map,
				title: "Biyani Dad & Co."
			});
		}
	</script>
	<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA5eHsmN6mmJpiPxJu8gXqJBPqphZ3k9qQ&callback=initmap"></script>
</body>
</html>
